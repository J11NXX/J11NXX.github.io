<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kasta — Store Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  :root{
    --ink:#1B1A2E; --ink-2:#26243B; --sl:rgba(255,255,255,.09); --sl-txt:rgba(255,255,255,.62);
    --canvas:#F5F4F9; --surface:#FFFFFF; --surface-2:#F8F7FB;
    --text:#1A1726; --muted:#6B6880; --faint:#9B98AD;
    --line:#ECEAF1; --line-2:#F2F1F6;
    --primary:#5B4BE8; --primary-d:#4A3BD6; --primary-soft:#ECE9FD;
    --accent:#FF8A3D;
    --positive:#15A66A; --positive-soft:#E2F4EC;
    --negative:#E2574C; --negative-soft:#FBE7E5;
    --warning:#E89A2E; --warning-soft:#FBEED6;
    --info:#3B82C4; --info-soft:#E3EEF7;
    --radius:16px; --radius-sm:11px;
    --shadow:0 1px 2px rgba(27,26,46,.04), 0 10px 28px rgba(27,26,46,.06);
    --shadow-lg:0 16px 50px rgba(27,26,46,.22);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif; background:var(--canvas); color:var(--text);
    -webkit-font-smoothing:antialiased; font-size:14px; line-height:1.45}
  #root{height:100%}
  .num{font-family:'Sora',sans-serif; font-variant-numeric:tabular-nums; letter-spacing:-.01em}
  .disp{font-family:'Sora',sans-serif; letter-spacing:-.02em}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input,select,textarea{font-family:inherit; font-size:14px; color:var(--text)}
  ::selection{background:var(--primary-soft)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}

  .shell{display:grid; grid-template-columns:250px 1fr; height:100%}
  /* dark sidebar */
  .sidebar{background:var(--ink); display:flex; flex-direction:column; padding:20px 14px; gap:4px; min-height:0}
  .brand{display:flex; align-items:center; gap:11px; padding:6px 10px 20px}
  .logo{width:36px; height:36px; border-radius:11px; flex:none; background:linear-gradient(135deg,var(--primary),#7B6CFF);
    display:grid; place-items:center; color:#fff; box-shadow:0 6px 18px rgba(91,75,232,.5)}
  .brand b{font-family:'Sora',sans-serif; font-size:18px; color:#fff; letter-spacing:-.01em}
  .brand span{display:block; font-size:10.5px; color:var(--sl-txt); letter-spacing:.08em; text-transform:uppercase; font-weight:600}
  .nav-label{font-size:10.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:rgba(255,255,255,.35); padding:16px 12px 7px}
  .nav-item{display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:11px; color:var(--sl-txt);
    font-weight:500; transition:.16s; width:100%; text-align:left}
  .nav-item svg{flex:none}
  .nav-item:hover{background:var(--sl); color:#fff}
  .nav-item.active{background:var(--primary); color:#fff; font-weight:600; box-shadow:0 6px 16px rgba(91,75,232,.4)}
  .nav-item .badge{margin-left:auto; background:var(--accent); color:#fff; font-size:10px; font-weight:700;
    padding:1px 7px; border-radius:20px; font-family:'Sora'}
  .side-foot{margin-top:auto; padding-top:12px}
  .store-card{background:var(--ink-2); border:1px solid var(--sl); border-radius:13px; padding:13px; display:flex; align-items:center; gap:11px}
  .store-card .sw{width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,#FF8A3D,#FF6B9D); flex:none}
  .store-card b{color:#fff; font-size:13px; font-family:'Sora'} .store-card span{color:var(--sl-txt); font-size:11px}
  .reset-link{width:100%; text-align:center; color:rgba(255,255,255,.4); font-size:12px; padding:10px; margin-top:6px; border-radius:10px; transition:.15s}
  .reset-link:hover{background:var(--sl); color:var(--sl-txt)}

  .main{display:flex; flex-direction:column; min-width:0; min-height:0; overflow:hidden}
  .topbar{height:66px; flex:none; background:var(--surface); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:16px; padding:0 26px}
  .topbar h1{font-family:'Sora',sans-serif; font-size:20px; letter-spacing:-.02em; font-weight:600}
  .topbar .sub{font-size:12px; color:var(--faint); margin-top:1px}
  .search{margin-left:auto; display:flex; align-items:center; gap:9px; background:var(--surface-2);
    border:1px solid var(--line); border-radius:11px; padding:9px 13px; width:250px; color:var(--faint)}
  .search input{border:none; background:none; outline:none; width:100%}
  .icon-btn{width:40px; height:40px; border-radius:11px; display:grid; place-items:center; color:var(--muted);
    border:1px solid var(--line); background:var(--surface-2); position:relative; transition:.16s}
  .icon-btn:hover{color:var(--text); border-color:#ddd9e6}
  .icon-btn .dot{position:absolute; top:9px; right:10px; width:7px; height:7px; border-radius:50%; background:var(--accent); border:2px solid var(--surface-2)}
  .avatar{width:40px; height:40px; border-radius:11px; flex:none; display:grid; place-items:center;
    background:linear-gradient(135deg,#5B4BE8,#7B6CFF); color:#fff; font-weight:600; font-size:13px; font-family:'Sora'}

  .scroll{overflow-y:auto; flex:1; padding:26px}
  .scroll::-webkit-scrollbar{width:10px} .scroll::-webkit-scrollbar-thumb{background:#d9d5e4; border-radius:10px; border:3px solid var(--canvas)}

  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
  .card-h{display:flex; align-items:center; gap:12px; padding:18px 22px 0}
  .card-h h3{font-family:'Sora',sans-serif; font-size:15px; font-weight:600; letter-spacing:-.01em}
  .card-h .right{margin-left:auto; display:flex; gap:8px; align-items:center}

  .pill{font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; display:inline-flex; align-items:center; gap:5px}
  .pill.pos{background:var(--positive-soft); color:var(--positive)}
  .pill.neg{background:var(--negative-soft); color:var(--negative)}
  .pill.muted{background:var(--surface-2); color:var(--muted)}
  .btn{display:inline-flex; align-items:center; gap:7px; font-weight:600; font-size:13px; padding:10px 16px;
    border-radius:11px; transition:.16s; border:1px solid transparent}
  .btn.primary{background:var(--primary); color:#fff; box-shadow:0 6px 16px rgba(91,75,232,.3)}
  .btn.primary:hover{background:var(--primary-d)}
  .btn.ghost{background:var(--surface); border-color:var(--line); color:var(--text)}
  .btn.ghost:hover{border-color:#ddd9e6; background:var(--surface-2)}
  .seg{display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:3px}
  .seg button{font-size:12px; font-weight:600; color:var(--muted); padding:6px 12px; border-radius:8px; transition:.14s}
  .seg button.on{background:var(--surface); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.07)}

  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:16px}
  .kpi{padding:19px 21px}
  .kpi .top{display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px; font-weight:500}
  .kpi .ic{width:36px; height:36px; border-radius:10px; display:grid; place-items:center}
  .kpi .val{font-size:28px; font-weight:600; margin:13px 0 8px}
  .kpi .foot{display:flex; align-items:center; gap:7px; font-size:12px; color:var(--faint)}

  .grid-main{display:grid; grid-template-columns:1.6fr 1fr; gap:16px; margin-top:16px}

  .chart-wrap{padding:8px 14px 16px; position:relative}
  .axis{fill:var(--faint); font-size:10.5px; font-family:'Inter'}
  .gridline{stroke:var(--line-2); stroke-width:1}
  .rev-line{fill:none; stroke:var(--primary); stroke-width:2.5; stroke-linecap:round;
    stroke-dasharray:1500; stroke-dashoffset:1500; animation:draw 1.4s .15s ease forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .tip{position:absolute; pointer-events:none; background:var(--ink); color:#fff; padding:7px 11px; border-radius:9px;
    font-size:12px; transform:translate(-50%,-130%); white-space:nowrap; box-shadow:var(--shadow-lg); opacity:0; transition:opacity .12s}
  .tip b{font-family:'Sora'}

  /* product / order rows */
  .prow{display:flex; align-items:center; gap:13px; padding:13px 22px; border-bottom:1px solid var(--line-2); transition:.12s}
  .prow:hover{background:var(--surface-2)} .prow:last-child{border:none}
  .thumb{width:44px; height:44px; border-radius:11px; flex:none; display:grid; place-items:center; color:#fff;
    font-family:'Sora'; font-weight:600; font-size:14px}
  .prow .info{min-width:0; flex:1} .prow .info b{font-weight:600; font-size:13.5px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .prow .info span{font-size:12px; color:var(--faint)}
  .spark{width:74px; height:30px; flex:none}

  .tablecard{margin-top:0; overflow:hidden}
  .tbl{width:100%; border-collapse:collapse}
  .tbl th{text-align:left; font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--faint);
    padding:13px 18px; border-bottom:1px solid var(--line); background:var(--surface-2); cursor:pointer; user-select:none}
  .tbl th:hover{color:var(--muted)} .tbl th .arr{opacity:.5; font-size:10px; margin-left:4px}
  .tbl td{padding:13px 18px; border-bottom:1px solid var(--line-2); font-size:13.5px} .tbl tr:last-child td{border:none}
  .tbl tr.click{cursor:pointer} .tbl tr.click:hover td{background:var(--surface-2)}
  .tag{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:3px 9px; border-radius:8px}
  .who{display:flex; align-items:center; gap:11px}
  .toolbar{display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap}
  .field{display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:9px 13px; color:var(--faint)}
  .field input{border:none; outline:none; background:none; width:190px}
  .field select{border:none; outline:none; background:none; cursor:pointer; color:var(--text); font-weight:500}

  .stockbar{height:6px; width:80px; background:var(--line); border-radius:6px; overflow:hidden}
  .stockbar i{display:block; height:100%; border-radius:6px}

  /* product grid */
  .pgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px}
  .pcard{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); transition:.18s}
  .pcard:hover{transform:translateY(-3px); box-shadow:var(--shadow-lg)}
  .pcard .img{height:120px; display:grid; place-items:center; color:#fff; font-family:'Sora'; font-weight:700; font-size:30px; position:relative}
  .pcard .img .flag{position:absolute; top:10px; left:10px}
  .pcard .body{padding:14px 16px}
  .pcard .body b{font-size:14px; display:block; margin-bottom:3px} .pcard .body .cat{font-size:12px; color:var(--faint)}
  .pcard .body .price{font-family:'Sora'; font-weight:700; font-size:18px; margin-top:10px}
  .pcard .body .meta{display:flex; align-items:center; gap:8px; margin-top:10px; font-size:12px; color:var(--muted)}
  .pcard .acts{display:flex; gap:8px; padding:0 16px 14px}
  .mini{flex:1; padding:8px; border:1px solid var(--line); border-radius:9px; font-size:12.5px; font-weight:600; color:var(--muted); transition:.14s; text-align:center}
  .mini:hover{background:var(--surface-2); color:var(--text)} .mini.del:hover{color:var(--negative); border-color:var(--negative)}

  /* modal / drawer */
  .overlay{position:fixed; inset:0; background:rgba(27,26,46,.45); backdrop-filter:blur(3px); z-index:50; animation:fade .18s ease}
  @keyframes fade{from{opacity:0}}
  .modal{background:var(--surface); border-radius:20px; width:100%; max-width:480px; box-shadow:var(--shadow-lg);
    animation:pop .2s cubic-bezier(.2,.8,.3,1); overflow:hidden; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%)}
  @keyframes pop{from{transform:translate(-50%,-46%) scale(.97); opacity:0}}
  .drawer{position:fixed; top:0; right:0; height:100%; width:440px; max-width:92vw; background:var(--surface);
    box-shadow:var(--shadow-lg); animation:slide .26s cubic-bezier(.2,.8,.3,1); display:flex; flex-direction:column}
  @keyframes slide{from{transform:translateX(40px); opacity:.4}}
  .modal-h{padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center}
  .modal-h h3{font-family:'Sora'; font-size:18px; font-weight:600} .modal-h .x{margin-left:auto; color:var(--faint); cursor:pointer; font-size:22px; line-height:1}
  .modal-b{padding:22px 24px; display:flex; flex-direction:column; gap:16px; overflow-y:auto}
  .modal-f{padding:16px 24px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end; background:var(--surface-2)}
  label.lbl{font-size:12px; font-weight:600; color:var(--muted); display:block; margin-bottom:6px}
  .inp{width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:11px; outline:none; transition:.14s; background:var(--surface)}
  .inp:focus{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft)}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:14px}

  /* order pipeline in drawer */
  .pipe{display:flex; gap:6px; margin:4px 0}
  .pipe .step{flex:1; height:5px; border-radius:6px; background:var(--line)}
  .pipe .step.on{background:var(--primary)}
  .line-item{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line-2)}
  .line-item:last-child{border:none}

  .empty{padding:60px 20px; text-align:center; color:var(--faint)}
  .empty b{display:block; color:var(--muted); font-size:15px; margin:12px 0 4px; font-family:'Sora'}

  @media (max-width:980px){.kpis{grid-template-columns:1fr 1fr} .grid-main{grid-template-columns:1fr}}
  @media (max-width:760px){
    .shell{grid-template-columns:1fr} .sidebar{display:none} .search{display:none}
    .topbar{padding:0 16px} .scroll{padding:16px} .kpis{grid-template-columns:1fr 1fr} .field input{width:120px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef}=React;

const store={
  get(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},
};
const money=n=>'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const moneyK=n=>'$'+(Math.abs(n)>=1000?(n/1000).toFixed(1)+'k':Number(n).toFixed(0));

const I={
  grid:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,
  bag:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>,
  box:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8M12 13v8"/></svg>,
  users:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 5.2a3.2 3.2 0 0 1 0 6M21 20c0-2.6-1.6-4.9-4-5.7"/></svg>,
  gear:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6.6 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 3 13.6H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.6 7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10 3.6V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0 1.1 2.7H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>,
  search:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,
  bell:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>,
  plus:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  up:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M7 14l5-5 5 5"/></svg>,
  down:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M7 10l5 5 5-5"/></svg>,
  dollar:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 6H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
  cart:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/><path d="M2 3h3l2.5 13h11l2-9H6"/></svg>,
  pct:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M19 5L5 19"/><circle cx="7.5" cy="7.5" r="2.5"/><circle cx="16.5" cy="16.5" r="2.5"/></svg>,
  avg:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 17l6-6 4 4 7-8"/><path d="M17 7h4v4"/></svg>,
};

/* ---- seed data ---- */
const CATCOLOR={Home:'#5B4BE8',Kitchen:'#FF8A3D',Lighting:'#E8A33D',Textiles:'#15A66A',Decor:'#E2574C'};
function gradFor(s){const i=s.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const g=[['#5B4BE8','#7B6CFF'],['#FF8A3D','#FF6B9D'],['#15A66A','#3FD68F'],['#E89A2E','#F5C242'],['#E2574C','#FF8A7A'],['#3B82C4','#67B0E8']];
  return g[i%g.length];}
function sparkData(seed){const r=[];let v=20+seed%30;for(let i=0;i<10;i++){v+=((seed*(i+3))%11)-4;r.push(Math.max(8,v));}return r;}

function seedProducts(){
  const P=[
    ['Linen Throw Pillow','Textiles',38,124,'live'],['Ceramic Pour-Over','Kitchen',54,7,'live'],
    ['Walnut Desk Tray','Home',46,62,'live'],['Wool Runner Rug','Textiles',180,18,'live'],
    ['Brass Table Lamp','Lighting',129,3,'live'],['Stoneware Mug Set','Kitchen',42,210,'live'],
    ['Rattan Pendant Light','Lighting',95,0,'draft'],['Oak Picture Frame','Decor',24,156,'live'],
    ['Marble Coaster Set','Decor',34,88,'live'],['Cotton Bath Towels','Textiles',58,71,'live'],
    ['Cast Iron Skillet','Kitchen',76,2,'live'],['Ceramic Plant Pot','Home',29,134,'live'],
  ];
  return P.map((p,i)=>({id:'P-'+(2100+i),name:p[0],cat:p[1],price:p[2],stock:p[3],status:p[4],
    sales:60+((i*37)%240),spark:sparkData(p[0].length*7+i)}));
}
const CUSTNAMES=['Aziza R.','Daniel M.','Sofia L.','Timur K.','Elena V.','Marcus T.','Nadia S.','James O.','Leila A.','Victor P.'];
function seedOrders(){
  const status=['delivered','shipped','processing','paid','refunded'];
  const today=new Date('2026-06-29');const rows=[];
  for(let i=0;i<24;i++){
    const d=new Date(today);d.setDate(d.getDate()-(i*0.9|0));
    const items=1+((i*3)%4);const total=(items*(28+((i*53)%140)));
    rows.push({id:'#'+(10480-i),customer:CUSTNAMES[i%CUSTNAMES.length],
      total,items,status:status[i%5],date:d.toISOString().slice(0,10),
      method:['Card','PayPal','Apple Pay','Card'][i%4]});
  }
  return rows;
}

/* ---- charts ---- */
function Spark({data,color}){
  const W=74,H=30,max=Math.max(...data),min=Math.min(...data);
  const x=i=>(i/(data.length-1))*W;const y=v=>H-2-((v-min)/(max-min||1))*(H-4);
  const d=data.map((v,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(' ');
  return <svg className="spark" viewBox={`0 0 ${W} ${H}`}><path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}
function RevChart({data}){
  const W=620,H=215,P={t:14,r:14,b:24,l:38},iw=W-P.l-P.r,ih=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d.v))*1.12,min=Math.min(...data.map(d=>d.v))*0.86;
  const x=i=>P.l+(i/(data.length-1))*iw,y=v=>P.t+ih-((v-min)/(max-min))*ih;
  const line=data.map((d,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(d.v).toFixed(1)}`).join(' ');
  const area=`${line} L${x(data.length-1)} ${P.t+ih} L${P.l} ${P.t+ih} Z`;
  const [hov,setHov]=useState(null);const ref=useRef();
  const move=e=>{const r=ref.current.getBoundingClientRect();const px=(e.clientX-r.left)/r.width*W;
    let i=Math.round((px-P.l)/iw*(data.length-1));i=Math.max(0,Math.min(data.length-1,i));setHov(i);};
  const ticks=[min,(min+max)/2,max];
  return(
    <div className="chart-wrap" onMouseLeave={()=>setHov(null)}>
      <svg ref={ref} viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}} onMouseMove={move}>
        <defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor="#5B4BE8" stopOpacity=".2"/><stop offset="1" stopColor="#5B4BE8" stopOpacity="0"/></linearGradient></defs>
        {ticks.map((t,i)=><g key={i}><line className="gridline" x1={P.l} x2={W-P.r} y1={y(t)} y2={y(t)}/>
          <text className="axis" x={P.l-8} y={y(t)+3} textAnchor="end">{moneyK(t)}</text></g>)}
        <path d={area} fill="url(#rg)"/><path className="rev-line" d={line}/>
        {data.map((d,i)=><text key={i} className="axis" x={x(i)} y={H-7} textAnchor="middle">{d.l}</text>)}
        {hov!==null&&<g><line x1={x(hov)} x2={x(hov)} y1={P.t} y2={P.t+ih} stroke="#ECEAF1" strokeDasharray="3 3"/>
          <circle cx={x(hov)} cy={y(data[hov].v)} r="5" fill="#fff" stroke="#5B4BE8" strokeWidth="2.5"/></g>}
      </svg>
      {hov!==null&&<div className="tip" style={{left:`${x(hov)/W*100}%`,top:`${y(data[hov].v)/H*100}%`,opacity:1}}>
        <b>{money(data[hov].v)}</b> · {data[hov].l}</div>}
    </div>
  );
}

function useCountUp(target,dur=900){
  const [v,setV]=useState(0);
  useEffect(()=>{let raf,start;const step=t=>{if(!start)start=t;const p=Math.min((t-start)/dur,1);
    setV(target*(1-Math.pow(1-p,3)));if(p<1)raf=requestAnimationFrame(step);};
    raf=requestAnimationFrame(step);return()=>cancelAnimationFrame(raf);},[target]);
  return v;
}
function KPI({icon,bg,c,label,value,prefix,suffix,delta,up}){
  const v=useCountUp(value);
  return(
    <div className="card kpi">
      <div className="top"><div className="ic" style={{background:bg,color:c}}>{icon}</div>{label}</div>
      <div className="val num">{prefix||''}{Math.round(v).toLocaleString('en-US')}{suffix||''}</div>
      <div className="foot"><span className={'pill '+(up?'pos':'neg')}>{up?I.up:I.down}{delta}</span><span>vs last week</span></div>
    </div>
  );
}

            <label className="lbl">Customer</label>
            <div className="who" style={{padding:'4px 0'}}><div className="thumb" style={{width:38,height:38,fontSize:13,background:`linear-gradient(135deg,${gradFor(order.customer)[0]},${gradFor(order.customer)[1]})`}}>{order.customer.split(' ').map(w=>w[0]).join('')}</div>
              <div><b style={{fontSize:14}}>{order.customer}</b><div style={{fontSize:12,color:'var(--faint)'}}>{order.customer.toLowerCase().replace(/[^a-z]/g,'')}@email.com</div></div></div>
          </div>
          <div>
            <label className="lbl">Items ({order.items})</label>
            {sample.map((p,i)=>{const[g1,g2]=gradFor(p.name);return(
              <div className="line-item" key={i}><div className="thumb" style={{width:38,height:38,fontSize:12,background:`linear-gradient(135deg,${g1},${g2})`}}>{p.name.split(' ').slice(0,2).map(w=>w[0]).join('')}</div>
                <div style={{flex:1}}><b style={{fontSize:13.5}}>{p.name}</b><div style={{fontSize:12,color:'var(--faint)'}}>Qty 1 · {p.cat}</div></div>
                <span className="num" style={{fontWeight:600}}>{money(p.price)}</span></div>);})}
          </div>
          <div style={{background:'var(--surface-2)',borderRadius:12,padding:'14px 16px'}}>
            <div style={{display:'flex',marginBottom:7,fontSize:13,color:'var(--muted)'}}><span>Subtotal</span><span className="num" style={{marginLeft:'auto'}}>{money(sub)}</span></div>
            <div style={{display:'flex',marginBottom:7,fontSize:13,color:'var(--muted)'}}><span>Shipping</span><span className="num" style={{marginLeft:'auto'}}>$6.00</span></div>
            <div style={{display:'flex',fontSize:15,fontWeight:600,paddingTop:9,borderTop:'1px solid var(--line)'}}><span>Total</span><span className="num" style={{marginLeft:'auto'}}>{money(order.total)}</span></div>
          </div>
        </div>
        <div className="modal-f">
          <button className="btn ghost" onClick={onClose}>Close</button>
          {idx>=0&&idx<3&&<button className="btn primary" onClick={()=>onAdvance(order.id,flow[idx+1])}>Mark as {ORDER_STATUS[flow[idx+1]][2]}</button>}
        </div>
      </div>
    </div>
  );
}

/* ---- shell ---- */
const TABS=[
  {id:'overview',label:'Overview',icon:I.grid,title:'Overview',sub:'How your store is doing'},
  {id:'orders',label:'Orders',icon:I.bag,title:'Orders',sub:'Manage and fulfill orders',badge:5},
  {id:'products',label:'Products',icon:I.box,title:'Products',sub:'Your catalog and inventory'},
  {id:'customers',label:'Customers',icon:I.users,title:'Customers',sub:'Who buys from you'},
  {id:'settings',label:'Settings',icon:I.gear,title:'Settings',sub:'Store configuration'},
];
function App(){
  const getTab=()=>{const h=window.location.hash.replace('#/','')||'overview';return TABS.find(t=>t.id===h)?h:'overview';};
  const [tab,setTab]=useState(getTab());
  const [products,setProducts]=useState(()=>store.get('kasta.products',seedProducts()));
  const [orders,setOrders]=useState(()=>store.get('kasta.orders',seedOrders()));
  const [modal,setModal]=useState(false);const [drawer,setDrawer]=useState(null);
  useEffect(()=>{store.set('kasta.products',products)},[products]);
  useEffect(()=>{store.set('kasta.orders',orders)},[orders]);
  useEffect(()=>{const h=()=>setTab(getTab());window.addEventListener('hashchange',h);return()=>window.removeEventListener('hashchange',h);},[]);
  const go=id=>{window.location.hash='#/'+id;setTab(id);};
  const cur=TABS.find(t=>t.id===tab);
  return(
    <div className="shell">
      <aside className="sidebar">
        <div className="brand"><div className="logo"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg></div>
          <div><b>Kasta</b><span>Store Admin</span></div></div>
        <div className="nav-label">Manage</div>
        {TABS.map(t=><button key={t.id} className={'nav-item'+(tab===t.id?' active':'')} onClick={()=>go(t.id)}>{t.icon}{t.label}{t.badge&&tab!==t.id&&<span className="badge">{t.badge}</span>}</button>)}
        <div className="side-foot">
          <div className="store-card"><div className="sw"/><div><b>Kasta Home</b><span>kasta.shop</span></div></div>
          <button className="reset-link" onClick={()=>{if(confirm('Reset products and orders to demo data?')){setProducts(seedProducts());setOrders(seedOrders());}}}>Reset demo data</button>
        </div>
      </aside>
      <div className="main">
        <header className="topbar">
          <div><h1>{cur.title}</h1><div className="sub">{cur.sub}</div></div>
          <div className="search">{I.search}<input placeholder="Search store…"/></div>
          <button className="icon-btn">{I.bell}<span className="dot"/></button>
          <div className="avatar">SK</div>
        </header>
        <div className="scroll">
          {tab==='overview'&&<Overview products={products} orders={orders}/>}
          {tab==='orders'&&<Orders orders={orders} onOpen={setDrawer}/>}
          {tab==='products'&&<Products products={products} onAdd={()=>setModal(true)}
            onDelete={id=>setProducts(p=>p.filter(x=>x.id!==id))}
            onRestock={id=>setProducts(p=>p.map(x=>x.id===id?{...x,stock:x.stock+25}:x))}/>}
          {tab==='customers'&&<Customers orders={orders}/>}
          {tab==='settings'&&<Settings/>}
        </div>
      </div>
      {modal&&<AddProduct onClose={()=>setModal(false)} onSave={p=>setProducts(x=>[p,...x])}/>}
      {drawer&&<OrderDrawer order={drawer} products={products} onClose={()=>setDrawer(null)}
        onAdvance={(id,st)=>{setOrders(o=>o.map(x=>x.id===id?{...x,status:st}:x));setDrawer(d=>({...d,status:st}));}}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
