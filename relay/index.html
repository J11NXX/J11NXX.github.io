<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Relay — Sales CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  :root{
    --canvas:#F2F4F7; --surface:#FFFFFF; --surface-2:#F7F8FA;
    --ink:#18202B; --muted:#5E6B79; --faint:#94A0AC;
    --line:#E7EAEF; --line-2:#EFF1F4;
    --primary:#2D5BE3; --primary-d:#2348C4; --primary-soft:#E6ECFD;
    --won:#12A266; --won-soft:#DEF3EA;
    --lost:#F2545B; --lost-soft:#FCE6E7;
    --amber:#E8923A; --amber-soft:#FBEEDD;
    --violet:#7C5CFC; --violet-soft:#ECE7FE;
    --slate:#7A8794; --slate-soft:#EEF1F3;
    --radius:14px; --radius-sm:11px;
    --shadow:0 1px 2px rgba(24,32,43,.04), 0 8px 24px rgba(24,32,43,.06);
    --shadow-lg:0 16px 48px rgba(24,32,43,.2);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif; background:var(--canvas); color:var(--ink);
    -webkit-font-smoothing:antialiased; font-size:14px; line-height:1.45}
  #root{height:100%}
  .num{font-family:'Plus Jakarta Sans',sans-serif; font-variant-numeric:tabular-nums; letter-spacing:-.01em}
  .disp{font-family:'Plus Jakarta Sans',sans-serif; letter-spacing:-.02em}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input,select{font-family:inherit; font-size:14px; color:var(--ink)}
  ::selection{background:var(--primary-soft)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}

  .app{display:flex; flex-direction:column; height:100%}
  /* top nav */
  .nav{height:62px; flex:none; background:var(--surface); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:8px; padding:0 24px}
  .brand{display:flex; align-items:center; gap:10px; margin-right:18px}
  .logo{width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg,var(--primary),#4F7BFF);
    display:grid; place-items:center; color:#fff; box-shadow:0 5px 14px rgba(45,91,227,.4)}
  .brand b{font-family:'Plus Jakarta Sans'; font-size:18px; font-weight:700; letter-spacing:-.02em}
  .navlinks{display:flex; gap:2px}
  .navlink{display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:10px; color:var(--muted);
    font-weight:500; transition:.15s; position:relative}
  .navlink svg{flex:none}
  .navlink:hover{background:var(--surface-2); color:var(--ink)}
  .navlink.active{background:var(--primary-soft); color:var(--primary-d); font-weight:600}
  .navlink .badge{background:var(--lost); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:20px; font-family:'Plus Jakarta Sans'}
  .search{margin-left:auto; display:flex; align-items:center; gap:9px; background:var(--surface-2);
    border:1px solid var(--line); border-radius:10px; padding:8px 13px; width:230px; color:var(--faint)}
  .search input{border:none; background:none; outline:none; width:100%}
  .icon-btn{width:38px; height:38px; border-radius:10px; display:grid; place-items:center; color:var(--muted);
    border:1px solid var(--line); background:var(--surface-2); position:relative; transition:.15s}
  .icon-btn:hover{color:var(--ink); border-color:#d9dee4}
  .icon-btn .dot{position:absolute; top:8px; right:9px; width:7px; height:7px; border-radius:50%; background:var(--lost); border:2px solid var(--surface-2)}
  .avatar{width:38px; height:38px; border-radius:10px; flex:none; display:grid; place-items:center;
    background:linear-gradient(135deg,#2D5BE3,#4F7BFF); color:#fff; font-weight:600; font-size:13px; font-family:'Plus Jakarta Sans'}
  .btn{display:inline-flex; align-items:center; gap:7px; font-weight:600; font-size:13px; padding:9px 15px;
    border-radius:10px; transition:.16s; border:1px solid transparent}
  .btn.primary{background:var(--primary); color:#fff; box-shadow:0 5px 14px rgba(45,91,227,.3)}
  .btn.primary:hover{background:var(--primary-d)}
  .btn.ghost{background:var(--surface); border-color:var(--line); color:var(--ink)}
  .btn.ghost:hover{border-color:#d9dee4; background:var(--surface-2)}

  .pagehead{display:flex; align-items:center; gap:14px; padding:22px 26px 0}
  .pagehead h1{font-family:'Plus Jakarta Sans'; font-size:22px; font-weight:700; letter-spacing:-.02em}
  .pagehead .sub{font-size:13px; color:var(--faint); margin-top:2px}
  .pagehead .right{margin-left:auto; display:flex; gap:10px; align-items:center}

  .body{flex:1; overflow:auto; min-height:0}
  .body::-webkit-scrollbar{width:10px; height:10px} .body::-webkit-scrollbar-thumb{background:#d7dce2; border-radius:10px; border:3px solid var(--canvas)}

  .pill{font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; display:inline-flex; align-items:center; gap:5px}
  .pill.won{background:var(--won-soft); color:var(--won)} .pill.lost{background:var(--lost-soft); color:var(--lost)}
  .pill.muted{background:var(--surface-2); color:var(--muted)}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}

  /* ---- kanban ---- */
  .board{display:flex; gap:16px; padding:20px 26px 28px; min-width:min-content}
  .col{width:268px; flex:none; display:flex; flex-direction:column; gap:10px}
  .col-h{display:flex; align-items:center; gap:9px; padding:2px 4px}
  .col-h .dot{width:9px; height:9px; border-radius:3px; flex:none}
  .col-h b{font-family:'Plus Jakarta Sans'; font-size:13.5px; font-weight:700}
  .col-h .cnt{background:var(--surface-2); border:1px solid var(--line); color:var(--muted); font-size:11px; font-weight:700;
    padding:1px 8px; border-radius:20px; font-family:'Plus Jakarta Sans'}
  .col-h .sum{margin-left:auto; font-size:12px; color:var(--faint); font-weight:600}
  .drop{flex:1; min-height:120px; border-radius:13px; padding:4px; transition:.15s; display:flex; flex-direction:column; gap:9px}
  .drop.over{background:var(--primary-soft); outline:2px dashed var(--primary); outline-offset:-2px}
  .deal{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:13px 14px; box-shadow:0 1px 2px rgba(24,32,43,.04);
    cursor:grab; transition:.14s; border-left:3px solid var(--slate)}
  .deal:hover{box-shadow:var(--shadow); transform:translateY(-1px)}
  .deal:active{cursor:grabbing}
  .deal.dragging{opacity:.4}
  .deal .co{font-family:'Plus Jakarta Sans'; font-weight:700; font-size:14px; margin-bottom:2px}
  .deal .ct{font-size:12px; color:var(--faint); margin-bottom:11px}
  .deal .mid{display:flex; align-items:center; justify-content:space-between}
  .deal .val{font-family:'Plus Jakarta Sans'; font-weight:700; font-size:16px}
  .deal .foot{display:flex; align-items:center; gap:8px; margin-top:11px; padding-top:11px; border-top:1px solid var(--line-2)}
  .deal .ow{width:24px; height:24px; border-radius:7px; display:grid; place-items:center; font-size:10px; font-weight:700; color:#fff; font-family:'Plus Jakarta Sans'}
  .deal .prob{margin-left:auto; font-size:11px; color:var(--muted); font-weight:600}
  .probbar{height:4px; background:var(--line); border-radius:4px; margin-top:9px; overflow:hidden}
  .probbar i{display:block; height:100%; border-radius:4px}
  .addcol{border:1.5px dashed var(--line); border-radius:11px; padding:11px; color:var(--faint); font-weight:600; font-size:13px;
    display:flex; align-items:center; justify-content:center; gap:7px; transition:.14s}
  .addcol:hover{border-color:var(--primary); color:var(--primary); background:var(--primary-soft)}

  /* ---- tables ---- */
  .wrap{padding:20px 26px 28px}
  .tablecard{overflow:hidden}
  .toolbar{display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap}
  .field{display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:8px 12px; color:var(--faint)}
  .field input{border:none; outline:none; background:none; width:200px}
  .field select{border:none; outline:none; background:none; cursor:pointer; color:var(--ink); font-weight:500}
  .tbl{width:100%; border-collapse:collapse}
  .tbl th{text-align:left; font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--faint);
    padding:12px 18px; border-bottom:1px solid var(--line); background:var(--surface-2)}
  .tbl td{padding:13px 18px; border-bottom:1px solid var(--line-2); font-size:13.5px} .tbl tr:last-child td{border:none}
  .tbl tr:hover td{background:var(--surface-2)}
  .who{display:flex; align-items:center; gap:11px}
  .ini{width:34px; height:34px; border-radius:9px; display:grid; place-items:center; font-weight:600; font-size:12px; color:#fff; font-family:'Plus Jakarta Sans'; flex:none}
  .tag{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:3px 9px; border-radius:8px}

  /* ---- activity ---- */
  .feed{max-width:680px; margin:0 auto}
  .act{display:flex; gap:14px; padding:4px 0}
  .act .rail{display:flex; flex-direction:column; align-items:center; flex:none}
  .act .ic{width:38px; height:38px; border-radius:11px; display:grid; place-items:center; flex:none}
  .act .ln{width:2px; flex:1; background:var(--line); margin:6px 0}
  .act:last-child .ln{display:none}
  .act .ct{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:14px 16px; margin-bottom:14px; box-shadow:var(--shadow)}
  .act .ct .top{display:flex; align-items:center; gap:8px; margin-bottom:5px}
  .act .ct .top b{font-family:'Plus Jakarta Sans'; font-weight:700; font-size:13.5px}
  .act .ct .top .time{margin-left:auto; font-size:12px; color:var(--faint)}
  .act .ct p{font-size:13px; color:var(--muted)}

  /* ---- reports ---- */
  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:16px}
  .kpi{padding:18px 20px}
  .kpi .top{display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px; font-weight:500}
  .kpi .ic{width:34px; height:34px; border-radius:9px; display:grid; place-items:center}
  .kpi .val{font-size:26px; font-weight:700; margin:12px 0 7px; font-family:'Plus Jakarta Sans'}
  .kpi .foot{display:flex; align-items:center; gap:7px; font-size:12px; color:var(--faint)}
  .rgrid{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  .card-h{display:flex; align-items:center; gap:12px; padding:18px 20px 0}
  .card-h h3{font-family:'Plus Jakarta Sans'; font-size:15px; font-weight:700; letter-spacing:-.01em}
  .funnel{padding:18px 20px}
  .fn-row{margin-bottom:15px}
  .fn-row .lab{display:flex; align-items:center; margin-bottom:7px; font-size:13px}
  .fn-row .lab .nm{font-weight:600} .fn-row .lab .v{margin-left:auto; font-family:'Plus Jakarta Sans'; font-weight:700}
  .fn-bar{height:30px; border-radius:8px; display:flex; align-items:center; padding:0 11px; color:#fff; font-size:12px; font-weight:700;
    font-family:'Plus Jakarta Sans'; transition:width 1s cubic-bezier(.3,.8,.3,1)}
  .vbars{display:flex; align-items:flex-end; gap:16px; height:190px; padding:18px 22px 6px}
  .vbar{flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; height:100%; justify-content:flex-end}
  .vbar .b{width:100%; max-width:34px; border-radius:6px 6px 0 0; background:var(--primary); transition:height 1s cubic-bezier(.3,.8,.3,1)}
  .vbar small{font-size:11px; color:var(--faint); font-weight:600}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(24,32,43,.45); backdrop-filter:blur(3px); display:grid; place-items:center; z-index:50; padding:20px; animation:fade .18s}
  @keyframes fade{from{opacity:0}}
  .modal{background:var(--surface); border-radius:18px; width:100%; max-width:460px; box-shadow:var(--shadow-lg); animation:pop .2s cubic-bezier(.2,.8,.3,1); overflow:hidden}
  @keyframes pop{from{transform:translateY(12px) scale(.98); opacity:0}}
  .modal-h{padding:20px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center}
  .modal-h h3{font-family:'Plus Jakarta Sans'; font-size:17px; font-weight:700} .modal-h .x{margin-left:auto; color:var(--faint); cursor:pointer; font-size:22px; line-height:1}
  .modal-b{padding:20px 22px; display:flex; flex-direction:column; gap:15px}
  .modal-f{padding:16px 22px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end; background:var(--surface-2)}
  label.lbl{font-size:12px; font-weight:600; color:var(--muted); display:block; margin-bottom:6px}
  .inp{width:100%; padding:10px 13px; border:1px solid var(--line); border-radius:10px; outline:none; transition:.14s; background:var(--surface)}
  .inp:focus{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft)}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:13px}
  .empty{padding:54px 20px; text-align:center; color:var(--faint)} .empty b{display:block; color:var(--muted); font-size:15px; margin:10px 0 4px; font-family:'Plus Jakarta Sans'}
  .reset-link{font-size:12px; color:var(--faint); font-weight:600; padding:8px 12px; border-radius:9px; transition:.14s}
  .reset-link:hover{background:var(--surface-2); color:var(--muted)}

  @media (max-width:920px){.kpis{grid-template-columns:1fr 1fr} .rgrid{grid-template-columns:1fr}}
  @media (max-width:680px){.navlinks .navlink span{display:none} .search{display:none} .pagehead{padding:16px} .wrap{padding:16px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef}=React;
const store={get(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};
const money=n=>'$'+Number(n).toLocaleString('en-US');
const moneyK=n=>'$'+(Math.abs(n)>=1000?(n/1000).toFixed(n>=10000?0:1)+'k':n);
const initials=s=>s.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

const I={
  board:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="5" height="18" rx="1.5"/><rect x="10" y="3" width="5" height="12" rx="1.5"/><rect x="17" y="3" width="4" height="8" rx="1.5"/></svg>,
  people:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 5.2a3.2 3.2 0 0 1 0 6M21 20c0-2.6-1.6-4.9-4-5.7"/></svg>,
  pulse:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg>,
  report:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7"/><rect x="13" y="7" width="3" height="11"/></svg>,
  search:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,
  bell:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>,
  plus:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  up:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M7 14l5-5 5 5"/></svg>,
  down:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M7 10l5 5 5-5"/></svg>,
  dollar:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 6H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
  target:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></svg>,
  flash:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8z"/></svg>,
  hand:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12V7a2 2 0 0 1 4 0v4M9 11V5a2 2 0 0 1 4 0v6M13 11V6a2 2 0 0 1 4 0v8a6 6 0 0 1-6 6H9l-4-4"/></svg>,
  mail:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>,
  phone:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 4h4l2 5-2 1a11 11 0 0 0 5 5l1-2 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>,
  note:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16v12l-4 4H4z"/><path d="M16 20v-4h4"/></svg>,
  meet:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>,
};

const STAGES=[
  {id:'lead',name:'Lead',color:'#7A8794'},
  {id:'qualified',name:'Qualified',color:'#2D5BE3'},
  {id:'proposal',name:'Proposal',color:'#7C5CFC'},
  {id:'negotiation',name:'Negotiation',color:'#E8923A'},
  {id:'won',name:'Won',color:'#12A266'},
];
const stageById=id=>STAGES.find(s=>s.id===id)||STAGES[0];
const OWNERS={You:'#2D5BE3',Dana:'#7C5CFC',Marcus:'#E8923A'};

function seedDeals(){
  const d=[
    ['Northwind Traders','Aziza Rahimova',42000,'qualified',60,'You'],
    ['Acme Logistics','Daniel Mercer',18500,'lead',25,'Dana'],
    ['Helios Bank','Sofia Lindqvist',96000,'proposal',70,'You'],
    ['Vertex Media','Timur Karimov',31000,'negotiation',85,'Marcus'],
    ['Sable Retail','Elena Volkova',12000,'won',100,'Dana'],
    ['Orbit Health','Marcus Tan',54000,'qualified',55,'You'],
    ['Pinecrest Group','Nadia Saidova',27500,'lead',20,'Marcus'],
    ['Lumen Energy','James Owens',120000,'negotiation',80,'You'],
    ['Kairo Foods','Leila Abdullaeva',16000,'proposal',65,'Dana'],
    ['Meridian Tech','Victor Petrov',73000,'won',100,'You'],
    ['Volt Mobility','Sara Kim',38000,'qualified',50,'Marcus'],
    ['Briar & Co','Omar Yusupov',9500,'lead',15,'Dana'],
  ];
  return d.map((x,i)=>({id:'D-'+(7300+i),company:x[0],contact:x[1],value:x[2],stage:x[3],prob:x[4],owner:x[5]}));
}
function seedActivity(){
  return [
    ['call','You','Helios Bank','Discovery call — they want to consolidate 3 vendors into one contract.','2h ago'],
    ['email','Dana','Acme Logistics','Sent pricing proposal v2 with the volume discount applied.','5h ago'],
    ['meet','Marcus','Vertex Media','Demo went well. Decision maker joining the next call.','Yesterday'],
    ['note','You','Lumen Energy','Budget confirmed at $120k. Procurement review is the only blocker.','Yesterday'],
    ['call','Dana','Kairo Foods','Left voicemail, following up Thursday.','2d ago'],
    ['email','You','Orbit Health','Intro email opened 4 times — strong signal, scheduling a call.','3d ago'],
  ];
}

/* count-up */
function useCountUp(t,dur=900){const[v,setV]=useState(0);
  useEffect(()=>{let raf,s;const step=x=>{if(!s)s=x;const p=Math.min((x-s)/dur,1);setV(t*(1-Math.pow(1-p,3)));if(p<1)raf=requestAnimationFrame(step)};raf=requestAnimationFrame(step);return()=>cancelAnimationFrame(raf)},[t]);return v;}
function KPI({icon,bg,c,label,value,prefix,suffix,delta,up}){const v=useCountUp(value);
  return(<div className="card kpi"><div className="top"><div className="ic" style={{background:bg,color:c}}>{icon}</div>{label}</div>
    <div className="val">{prefix||''}{Math.round(v).toLocaleString('en-US')}{suffix||''}</div>
    <div className="foot"><span className={'pill '+(up?'won':'lost')}>{up?I.up:I.down}{delta}</span><span>vs last quarter</span></div></div>);}

/* ---- pipeline (drag & drop) ---- */
function Pipeline({deals,setDeals,onAdd}){
  const [dragId,setDragId]=useState(null);
  const [over,setOver]=useState(null);
  const move=(id,stage)=>setDeals(ds=>ds.map(d=>d.id===id?{...d,stage,prob:stage==='won'?100:d.prob}:d));
  return(
    <div className="body">
      <div className="pagehead"><div><h1>Pipeline</h1><div className="sub">Drag deals between stages to update them</div></div>
        <div className="right"><span className="pill muted">{deals.length} open deals</span>
          <button className="btn primary" onClick={onAdd}>{I.plus} New deal</button></div></div>
      <div className="board">
        {STAGES.map(st=>{
          const list=deals.filter(d=>d.stage===st.id);
          const sum=list.reduce((s,d)=>s+d.value,0);
          return(
            <div className="col" key={st.id}>
              <div className="col-h"><span className="dot" style={{background:st.color}}/><b>{st.name}</b>
                <span className="cnt">{list.length}</span><span className="sum">{moneyK(sum)}</span></div>
              <div className={'drop'+(over===st.id?' over':'')}
                onDragOver={e=>{e.preventDefault();if(over!==st.id)setOver(st.id);}}
                onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setOver(o=>o===st.id?null:o);}}
                onDrop={e=>{e.preventDefault();if(dragId)move(dragId,st.id);setDragId(null);setOver(null);}}>
                {list.map(d=>(
                  <div key={d.id} className={'deal'+(dragId===d.id?' dragging':'')} draggable
                    style={{borderLeftColor:st.color}}
                    onDragStart={()=>setDragId(d.id)} onDragEnd={()=>{setDragId(null);setOver(null);}}>
                    <div className="co">{d.company}</div>
                    <div className="ct">{d.contact}</div>
                    <div className="mid"><span className="val">{money(d.value)}</span>
                      {st.id==='won'&&<span className="pill won">Won</span>}</div>
                    <div className="probbar"><i style={{width:d.prob+'%',background:st.color}}/></div>
                    <div className="foot"><div className="ow" style={{background:OWNERS[d.owner]}}>{initials(d.owner)}</div>
                      <span style={{fontSize:12,color:'var(--muted)'}}>{d.owner}</span>
                      <span className="prob">{d.prob}%</span></div>
                  </div>))}
                {list.length===0&&<div style={{textAlign:'center',color:'var(--faint)',fontSize:12,padding:'24px 0'}}>Drop deals here</div>}
              </div>
            </div>);})}
      </div>
    </div>
  );
}

function Contacts({deals}){
  const [q,setQ]=useState('');
  const map={};
  deals.forEach(d=>{if(!map[d.company])map[d.company]={company:d.company,contact:d.contact,value:0,n:0,owner:d.owner,stages:new Set()};
    map[d.company].value+=d.value;map[d.company].n++;map[d.company].stages.add(d.stage);});
  let rows=Object.values(map).sort((a,b)=>b.value-a.value);
  if(q)rows=rows.filter(r=>r.company.toLowerCase().includes(q.toLowerCase())||r.contact.toLowerCase().includes(q.toLowerCase()));
  return(
    <div className="body"><div className="pagehead"><div><h1>Contacts</h1><div className="sub">Companies and people in your pipeline</div></div></div>
      <div className="wrap">
        <div className="toolbar"><div className="field">{I.search}<input placeholder="Search company or contact…" value={q} onChange={e=>setQ(e.target.value)}/></div>
          <span className="pill muted" style={{marginLeft:'auto'}}>{rows.length} accounts</span></div>
        <div className="card tablecard"><table className="tbl"><thead><tr><th>Company</th><th>Primary contact</th><th>Owner</th><th>Open deals</th><th>Pipeline value</th></tr></thead>
          <tbody>{rows.map((r,i)=>(<tr key={i}>
            <td><div className="who"><div className="ini" style={{background:stageById([...r.stages][0]).color}}>{initials(r.company)}</div><b style={{fontWeight:600}}>{r.company}</b></div></td>
            <td>{r.contact}</td><td><span className="tag" style={{background:OWNERS[r.owner]+'1A',color:OWNERS[r.owner]}}><span className="ow" style={{width:18,height:18,fontSize:9,background:OWNERS[r.owner]}}>{initials(r.owner)}</span>{r.owner}</span></td>
            <td className="num" style={{color:'var(--muted)'}}>{r.n}</td><td className="num" style={{fontWeight:600}}>{money(r.value)}</td></tr>))}</tbody></table>
          {rows.length===0&&<div className="empty"><div style={{opacity:.4}}>{I.people}</div><b>No contacts found</b>Try another search.</div>}</div>
      </div>
    </div>
  );
}

function Activity(){
  const acts=seedActivity();
  const cfg={call:[I.phone,'var(--won)','var(--won-soft)'],email:[I.mail,'var(--primary)','var(--primary-soft)'],
    note:[I.note,'var(--amber)','var(--amber-soft)'],meet:[I.meet,'var(--violet)','var(--violet-soft)']};
  return(
    <div className="body"><div className="pagehead"><div><h1>Activity</h1><div className="sub">Everything happening across your deals</div></div></div>
      <div className="wrap"><div className="feed">
        {acts.map((a,i)=>{const[ic,c,bg]=cfg[a[0]];return(
          <div className="act" key={i}>
            <div className="rail"><div className="ic" style={{background:bg,color:c}}>{ic}</div><div className="ln"/></div>
            <div className="ct"><div className="top"><div className="ow" style={{width:22,height:22,borderRadius:7,display:'grid',placeItems:'center',fontSize:9,fontWeight:700,color:'#fff',background:OWNERS[a[1]]}}>{initials(a[1])}</div>
              <b>{a[1]}</b><span style={{color:'var(--faint)',fontSize:13}}>· {a[2]}</span><span className="time">{a[4]}</span></div>
              <p>{a[3]}</p></div>
          </div>);})}
      </div></div>
    </div>
  );
}

function Reports({deals}){
  const open=deals.filter(d=>d.stage!=='won');
  const won=deals.filter(d=>d.stage==='won');
  const totalOpen=open.reduce((s,d)=>s+d.value,0);
  const wonVal=won.reduce((s,d)=>s+d.value,0);
  const weighted=open.reduce((s,d)=>s+d.value*d.prob/100,0);
  const winRate=Math.round(won.length/deals.length*100);
  const byStage=STAGES.map(st=>({...st,list:deals.filter(d=>d.stage===st.id),
    val:deals.filter(d=>d.stage===st.id).reduce((s,d)=>s+d.value,0)}));
  const maxV=Math.max(...byStage.map(s=>s.val));
  const forecast=[['Apr',64],['May',82],['Jun',73],['Jul',95],['Aug',88],['Sep',110]];
  const fmax=Math.max(...forecast.map(f=>f[1]));
  const [m,setM]=useState(false);useEffect(()=>{const t=setTimeout(()=>setM(true),60);return()=>clearTimeout(t)},[]);
  return(
    <div className="body"><div className="pagehead"><div><h1>Reports</h1><div className="sub">Pipeline health and forecast</div></div></div>
      <div className="wrap">
        <div className="kpis">
          <KPI icon={I.dollar} bg="var(--primary-soft)" c="var(--primary)" label="Open pipeline" prefix="$" value={totalOpen} delta="11.0%" up/>
          <KPI icon={I.flash} bg="var(--violet-soft)" c="var(--violet)" label="Weighted forecast" prefix="$" value={Math.round(weighted)} delta="7.4%" up/>
          <KPI icon={I.hand} bg="var(--won-soft)" c="var(--won)" label="Won this quarter" prefix="$" value={wonVal} delta="18.0%" up/>
          <KPI icon={I.target} bg="var(--amber-soft)" c="var(--amber)" label="Win rate" value={winRate} suffix="%" delta="2.0%" up/>
        </div>
        <div className="rgrid">
          <div className="card">
            <div className="card-h"><h3>Deals by stage</h3></div>
            <div className="funnel">{byStage.map(st=>(
              <div className="fn-row" key={st.id}>
                <div className="lab"><span className="nm">{st.name}</span><span className="v">{st.list.length} · {moneyK(st.val)}</span></div>
                <div className="fn-bar" style={{background:st.color,width:m?Math.max(14,st.val/maxV*100)+'%':'0%'}}>{st.list.length}</div>
              </div>))}</div>
          </div>
          <div className="card">
            <div className="card-h"><h3>Revenue forecast</h3><div className="right"><span className="pill won">{I.up}On track</span></div></div>
            <div className="vbars">{forecast.map((f,i)=>(
              <div className="vbar" key={i}><div style={{width:'100%',display:'flex',justifyContent:'center'}}>
                <div className="b" style={{height:m?f[1]/fmax*150:0,background:i>2?'var(--primary)':'#B9C7EE'}}/></div><small>{f[0]}</small></div>))}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function AddDeal({onClose,onSave}){
  const [f,setF]=useState({company:'',contact:'',value:'',stage:'lead',owner:'You'});
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const valid=f.company.trim()&&f.contact.trim()&&parseFloat(f.value)>0;
  const save=()=>{if(!valid)return;const probs={lead:20,qualified:50,proposal:65,negotiation:82,won:100};
    onSave({id:'D-'+Math.floor(7400+Math.random()*599),company:f.company.trim(),contact:f.contact.trim(),
      value:parseFloat(f.value),stage:f.stage,prob:probs[f.stage],owner:f.owner});onClose();};
  return(
    <div className="overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-h"><h3>New deal</h3><span className="x" onClick={onClose}>×</span></div>
      <div className="modal-b">
        <div><label className="lbl">Company</label><input className="inp" placeholder="e.g. Northwind Traders" value={f.company} onChange={e=>set('company',e.target.value)}/></div>
        <div><label className="lbl">Primary contact</label><input className="inp" placeholder="Full name" value={f.contact} onChange={e=>set('contact',e.target.value)}/></div>
        <div className="row2">
          <div><label className="lbl">Deal value (USD)</label><input className="inp" type="number" placeholder="0" value={f.value} onChange={e=>set('value',e.target.value)}/></div>
          <div><label className="lbl">Owner</label><select className="inp" value={f.owner} onChange={e=>set('owner',e.target.value)}>{Object.keys(OWNERS).map(o=><option key={o}>{o}</option>)}</select></div>
        </div>
        <div><label className="lbl">Stage</label><select className="inp" value={f.stage} onChange={e=>set('stage',e.target.value)}>{STAGES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
      </div>
      <div className="modal-f"><button className="btn ghost" onClick={onClose}>Cancel</button>
        <button className="btn primary" style={{opacity:valid?1:.5,pointerEvents:valid?'auto':'none'}} onClick={save}>{I.plus} Add deal</button></div>
    </div></div>
  );
}

const TABS=[{id:'pipeline',label:'Pipeline',icon:I.board},{id:'contacts',label:'Contacts',icon:I.people},
  {id:'activity',label:'Activity',icon:I.pulse,badge:3},{id:'reports',label:'Reports',icon:I.report}];
function App(){
  const getTab=()=>{const h=window.location.hash.replace('#/','')||'pipeline';return TABS.find(t=>t.id===h)?h:'pipeline';};
  const [tab,setTab]=useState(getTab());
  const [deals,setDeals]=useState(()=>store.get('relay.deals',seedDeals()));
  const [modal,setModal]=useState(false);
  useEffect(()=>{store.set('relay.deals',deals)},[deals]);
  useEffect(()=>{const h=()=>setTab(getTab());window.addEventListener('hashchange',h);return()=>window.removeEventListener('hashchange',h);},[]);
  const go=id=>{window.location.hash='#/'+id;setTab(id);};
  return(
    <div className="app">
      <nav className="nav">
        <div className="brand"><div className="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12h7l2-4 3 8 2-4h2"/></svg></div><b>Relay</b></div>
        <div className="navlinks">{TABS.map(t=><button key={t.id} className={'navlink'+(tab===t.id?' active':'')} onClick={()=>go(t.id)}>{t.icon}<span>{t.label}</span>{t.badge&&tab!==t.id&&<span className="badge">{t.badge}</span>}</button>)}</div>
        <div className="search">{I.search}<input placeholder="Search deals…"/></div>
        <button className="reset-link" onClick={()=>{if(confirm('Reset pipeline to demo data?'))setDeals(seedDeals())}}>Reset</button>
        <button className="icon-btn">{I.bell}<span className="dot"/></button>
        <div className="avatar">SK</div>
      </nav>
      {tab==='pipeline'&&<Pipeline deals={deals} setDeals={setDeals} onAdd={()=>setModal(true)}/>}
      {tab==='contacts'&&<Contacts deals={deals}/>}
      {tab==='activity'&&<Activity/>}
      {tab==='reports'&&<Reports deals={deals}/>}
      {modal&&<AddDeal onClose={()=>setModal(false)} onSave={d=>setDeals(x=>[d,...x])}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
