<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strata — Payments & Finance Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  :root{
    --canvas:#EBEEF2; --surface:#FFFFFF; --surface-2:#F6F8FA;
    --ink:#0E1A24; --muted:#5A6B78; --faint:#8A98A4;
    --line:#E3E8ED; --line-2:#EDF1F4;
    --primary:#0E7C7B; --primary-d:#0A5E5D; --primary-soft:#DCEFEE;
    --positive:#15A66A; --positive-soft:#E0F3EA;
    --negative:#E2574C; --negative-soft:#FBE6E4;
    --warning:#D9942B; --warning-soft:#F8ECD7;
    --radius:14px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(14,26,36,.04), 0 8px 24px rgba(14,26,36,.05);
    --shadow-lg:0 12px 40px rgba(14,26,36,.16);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif; background:var(--canvas); color:var(--ink);
    -webkit-font-smoothing:antialiased; font-size:14px; line-height:1.45;
  }
  #root{height:100%}
  .num{font-family:'Space Grotesk',sans-serif; font-variant-numeric:tabular-nums; letter-spacing:-.01em}
  .display{font-family:'Space Grotesk',sans-serif; letter-spacing:-.02em}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input,select{font-family:inherit; font-size:14px; color:var(--ink)}
  ::selection{background:var(--primary-soft)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}

  /* ---------- shell ---------- */
  .shell{display:grid; grid-template-columns:248px 1fr; height:100%}
  .sidebar{
    background:var(--surface); border-right:1px solid var(--line);
    display:flex; flex-direction:column; padding:20px 14px; gap:6px; min-height:0;
  }
  .brand{display:flex; align-items:center; gap:11px; padding:6px 10px 18px}
  .logo{
    width:34px; height:34px; border-radius:10px; flex:none;
    background:linear-gradient(135deg,var(--primary),#13A3A1);
    display:grid; place-items:center; color:#fff; box-shadow:0 4px 12px rgba(14,124,123,.35);
  }
  .brand b{font-family:'Space Grotesk',sans-serif; font-size:17px; letter-spacing:-.01em}
  .brand span{display:block; font-size:11px; color:var(--faint); letter-spacing:.04em; text-transform:uppercase; font-weight:600}
  .nav-label{font-size:10.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); padding:14px 12px 6px}
  .nav-item{
    display:flex; align-items:center; gap:12px; padding:9px 12px; border-radius:10px;
    color:var(--muted); font-weight:500; transition:.16s; width:100%; text-align:left; position:relative;
  }
  .nav-item svg{flex:none}
  .nav-item:hover{background:var(--surface-2); color:var(--ink)}
  .nav-item.active{background:var(--primary-soft); color:var(--primary-d); font-weight:600}
  .nav-item .badge{margin-left:auto; background:var(--negative); color:#fff; font-size:10px; font-weight:700;
    padding:1px 7px; border-radius:20px; font-family:'Space Grotesk',sans-serif}
  .side-foot{margin-top:auto; padding:12px 6px 0; border-top:1px solid var(--line-2)}
  .side-card{background:var(--surface-2); border-radius:12px; padding:13px; margin-top:6px}
  .side-card p{font-size:12px; color:var(--muted); margin-bottom:9px}
  .side-card .bar{height:6px; background:var(--line); border-radius:6px; overflow:hidden}
  .side-card .bar i{display:block; height:100%; width:64%; background:var(--primary); border-radius:6px}
  .side-card small{font-size:11px; color:var(--faint); display:block; margin-top:7px}

  .main{display:flex; flex-direction:column; min-width:0; min-height:0; overflow:hidden}
  .topbar{
    height:64px; flex:none; background:var(--surface); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:16px; padding:0 26px;
  }
  .topbar h1{font-family:'Space Grotesk',sans-serif; font-size:19px; letter-spacing:-.02em; font-weight:600}
  .topbar .sub{font-size:12px; color:var(--faint); margin-top:1px}
  .search{
    margin-left:auto; display:flex; align-items:center; gap:9px; background:var(--surface-2);
    border:1px solid var(--line); border-radius:10px; padding:8px 13px; width:260px; color:var(--faint);
  }
  .search input{border:none; background:none; outline:none; width:100%}
  .icon-btn{width:38px; height:38px; border-radius:10px; display:grid; place-items:center;
    color:var(--muted); border:1px solid var(--line); background:var(--surface-2); position:relative; transition:.16s}
  .icon-btn:hover{color:var(--ink); border-color:#cfd8de}
  .icon-btn .dot{position:absolute; top:8px; right:9px; width:7px; height:7px; border-radius:50%;
    background:var(--negative); border:2px solid var(--surface-2)}
  .avatar{width:38px; height:38px; border-radius:10px; flex:none; display:grid; place-items:center;
    background:linear-gradient(135deg,#2C3E50,#1B2A38); color:#fff; font-weight:600; font-size:13px;
    font-family:'Space Grotesk',sans-serif}

  .scroll{overflow-y:auto; flex:1; padding:26px}
  .scroll::-webkit-scrollbar{width:10px} .scroll::-webkit-scrollbar-thumb{background:#d6dde2; border-radius:10px; border:3px solid var(--canvas)}

  /* ---------- generic ---------- */
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
  .card-h{display:flex; align-items:center; gap:12px; padding:18px 20px 0}
  .card-h h3{font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600; letter-spacing:-.01em}
  .card-h .right{margin-left:auto; display:flex; gap:8px; align-items:center}
  .pill{font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; display:inline-flex; align-items:center; gap:5px}
  .pill.pos{background:var(--positive-soft); color:var(--positive)}
  .pill.neg{background:var(--negative-soft); color:var(--negative)}
  .pill.warn{background:var(--warning-soft); color:var(--warning)}
  .pill.muted{background:var(--surface-2); color:var(--muted)}
  .seg{display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; padding:3px}
  .seg button{font-size:12px; font-weight:600; color:var(--muted); padding:5px 11px; border-radius:7px; transition:.14s}
  .seg button.on{background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .btn{display:inline-flex; align-items:center; gap:7px; font-weight:600; font-size:13px; padding:9px 15px;
    border-radius:10px; transition:.16s; border:1px solid transparent}
  .btn.primary{background:var(--primary); color:#fff; box-shadow:0 4px 12px rgba(14,124,123,.28)}
  .btn.primary:hover{background:var(--primary-d)}
  .btn.ghost{background:var(--surface); border-color:var(--line); color:var(--ink)}
  .btn.ghost:hover{border-color:#cfd8de; background:var(--surface-2)}

  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:16px}
  .kpi{padding:18px 20px}
  .kpi .top{display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px; font-weight:500}
  .kpi .ic{width:34px; height:34px; border-radius:9px; display:grid; place-items:center}
  .kpi .val{font-size:27px; font-weight:600; margin:13px 0 7px}
  .kpi .foot{display:flex; align-items:center; gap:7px; font-size:12px; color:var(--faint)}

  .grid-2{display:grid; grid-template-columns:1.65fr 1fr; gap:16px; margin-top:16px}
  .grid-2b{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px}

  /* chart */
  .chart-wrap{padding:8px 12px 16px}
  .axis text{fill:var(--faint); font-size:10.5px; font-family:'Inter'}
  .gridline{stroke:var(--line-2); stroke-width:1}
  .area-line{fill:none; stroke:var(--primary); stroke-width:2.5; stroke-linecap:round;
    stroke-dasharray:1400; stroke-dashoffset:1400; animation:draw 1.4s .15s ease forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .dot-pt{fill:var(--surface); stroke:var(--primary); stroke-width:2.5}
  .hov-line{stroke:var(--line); stroke-width:1; stroke-dasharray:3 3}
  .tip{position:absolute; pointer-events:none; background:var(--ink); color:#fff; padding:7px 11px;
    border-radius:8px; font-size:12px; transform:translate(-50%,-130%); white-space:nowrap; box-shadow:var(--shadow-lg); opacity:0; transition:opacity .12s}
  .tip b{font-family:'Space Grotesk',sans-serif}

  /* legend / list */
  .leg{display:flex; flex-direction:column; gap:2px; padding:6px 20px 18px}
  .leg-row{display:flex; align-items:center; gap:11px; padding:9px 0; border-bottom:1px solid var(--line-2)}
  .leg-row:last-child{border:none}
  .leg-row .sw{width:9px; height:9px; border-radius:3px; flex:none}
  .leg-row .nm{font-weight:500}
  .leg-row .amt{margin-left:auto; font-weight:600}
  .leg-row .pct{color:var(--faint); font-size:12px; width:42px; text-align:right}

  /* txn list */
  .tx{display:flex; align-items:center; gap:13px; padding:13px 20px; border-bottom:1px solid var(--line-2); transition:.12s}
  .tx:hover{background:var(--surface-2)}
  .tx:last-child{border:none}
  .tx .ic{width:38px; height:38px; border-radius:10px; display:grid; place-items:center; flex:none; font-weight:600;
    font-family:'Space Grotesk',sans-serif; font-size:14px}
  .tx .info{min-width:0}
  .tx .info b{font-weight:600; font-size:13.5px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .tx .info span{font-size:12px; color:var(--faint)}
  .tx .amt{margin-left:auto; text-align:right; flex:none}
  .tx .amt b{font-weight:600; font-size:14px}
  .tx .amt span{display:block; font-size:11px; color:var(--faint)}

  /* table */
  .tablecard{margin-top:16px; overflow:hidden}
  .tbl{width:100%; border-collapse:collapse}
  .tbl th{text-align:left; font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    color:var(--faint); padding:12px 18px; border-bottom:1px solid var(--line); background:var(--surface-2); cursor:pointer; user-select:none}
  .tbl th:hover{color:var(--muted)}
  .tbl th .arr{opacity:.5; font-size:10px; margin-left:4px}
  .tbl td{padding:13px 18px; border-bottom:1px solid var(--line-2); font-size:13.5px}
  .tbl tr:last-child td{border:none}
  .tbl tr:hover td{background:var(--surface-2)}
  .tag{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:3px 9px; border-radius:7px}
  .who{display:flex; align-items:center; gap:11px}
  .who . av{width:32px; height:32px; border-radius:8px; display:grid; place-items:center; font-weight:600; font-size:12px;
    font-family:'Space Grotesk',sans-serif; flex:none}
  .toolbar{display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap}
  .field{display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line);
    border-radius:10px; padding:8px 12px; color:var(--faint)}
  .field input{border:none; outline:none; background:none; width:190px}
  .field select{border:none; outline:none; background:none; cursor:pointer; color:var(--ink); font-weight:500}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(14,26,36,.42); backdrop-filter:blur(3px);
    display:grid; place-items:center; z-index:50; padding:20px; animation:fade .18s ease}
  @keyframes fade{from{opacity:0}}
  .modal{background:var(--surface); border-radius:18px; width:100%; max-width:460px; box-shadow:var(--shadow-lg);
    animation:pop .2s cubic-bezier(.2,.8,.3,1); overflow:hidden}
  @keyframes pop{from{transform:translateY(12px) scale(.98); opacity:0}}
  .modal-h{padding:20px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center}
  .modal-h h3{font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:600}
  .modal-b{padding:20px 22px; display:flex; flex-direction:column; gap:15px}
  .modal-f{padding:16px 22px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end; background:var(--surface-2)}
  label.lbl{font-size:12px; font-weight:600; color:var(--muted); display:block; margin-bottom:6px}
  .inp{width:100%; padding:10px 13px; border:1px solid var(--line); border-radius:10px; outline:none; transition:.14s; background:var(--surface)}
  .inp:focus{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft)}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:13px}
  .seg-in{display:flex; gap:8px}
  .seg-in button{flex:1; padding:9px; border:1px solid var(--line); border-radius:10px; font-weight:600; font-size:13px; color:var(--muted)}
  .seg-in button.on-pos{background:var(--positive-soft); border-color:var(--positive); color:var(--positive)}
  .seg-in button.on-neg{background:var(--negative-soft); border-color:var(--negative); color:var(--negative)}

  /* analytics bars */
  .vbars{display:flex; align-items:flex-end; gap:14px; height:200px; padding:18px 22px 8px}
  .vbar{flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; height:100%; justify-content:flex-end}
  .vbar .stack{width:100%; max-width:38px; display:flex; flex-direction:column-reverse; border-radius:6px 6px 0 0; overflow:hidden;
    transition:.3s}
  .vbar .seg-in-bar{transition:height 1s cubic-bezier(.3,.8,.3,1)}
  .vbar small{font-size:11px; color:var(--faint); font-weight:600}

  .settings-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px}
  .set-row{display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid var(--line-2)}
  .set-row:last-child{border:none}
  .set-row .t b{display:block; font-weight:600; font-size:13.5px}
  .set-row .t span{font-size:12px; color:var(--faint)}
  .set-row .ctl{margin-left:auto}
  .toggle{width:42px; height:24px; border-radius:20px; background:var(--line); position:relative; transition:.2s; flex:none}
  .toggle.on{background:var(--primary)}
  .toggle i{position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle.on i{left:21px}

  .empty{padding:60px 20px; text-align:center; color:var(--faint)}
  .empty b{display:block; color:var(--muted); font-size:15px; margin:12px 0 4px; font-family:'Space Grotesk',sans-serif}

  .mobile-warn{display:none}
  @media (max-width:980px){
    .kpis{grid-template-columns:1fr 1fr} .grid-2,.grid-2b,.settings-grid{grid-template-columns:1fr}
  }
  @media (max-width:760px){
    .shell{grid-template-columns:1fr} .sidebar{display:none} .search{display:none}
    .topbar{padding:0 16px} .scroll{padding:16px} .kpis{grid-template-columns:1fr 1fr}
    .field input{width:120px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useMemo, useRef} = React;

/* ---------------- icons (inline svg) ---------------- */
const I = {
  grid:   <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,
  swap:   <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 10h14l-4-4M17 14H3l4 4"/></svg>,
  chart:  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-5 3 3 5-7"/></svg>,
  users:  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 5.2a3.2 3.2 0 0 1 0 6M21 20c0-2.6-1.6-4.9-4-5.7"/></svg>,
  gear:   <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6.6 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 3 13.6H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.6 7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10 3.6V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0 1.1 2.7H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>,
  search: <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,
  bell:   <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>,
  plus:   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  up:     <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M7 14l5-5 5 5"/></svg>,
  down:   <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M7 10l5 5 5-5"/></svg>,
  wallet: <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="6" width="18" height="14" rx="3"/><path d="M3 10h18M16 14h2"/></svg>,
  card:   <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/></svg>,
  trend:  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 17l6-6 4 4 7-8"/><path d="M17 7h4v4"/></svg>,
  pct:    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M19 5L5 19"/><circle cx="7.5" cy="7.5" r="2.5"/><circle cx="16.5" cy="16.5" r="2.5"/></svg>,
  trash:  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>,
};

/* safe storage: works on GitHub Pages, silently no-ops in sandboxed previews */
const store = {
  get(k, fallback){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } },
  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} },
};

const fmt = n => (n<0?'-':'') + '$' + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
const fmtK = n => '$' + (Math.abs(n)>=1000 ? (n/1000).toFixed(1)+'k' : n.toFixed(0));

/* ---------------- seed data ---------------- */
const CATS = {
  'Payouts':        {c:'#0E7C7B'}, 'Subscriptions':{c:'#15A66A'}, 'Infrastructure':{c:'#D9942B'},
  'Payroll':        {c:'#5B6FE0'}, 'Refunds':      {c:'#E2574C'}, 'Fees':         {c:'#8A98A4'},
};
const NAMES = ['Aurora Labs','Meridian Co','Volt Systems','Kairo Studio','Northwind Ltd','Sable & Finch','Orbit Media','Pinecrest Inc','Lumen Group','Vega Foods','Halcyon AG','Briar Tech'];
const initials = s => s.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const avColor = i => ['#0E7C7B','#5B6FE0','#D9942B','#E2574C','#15A66A','#2C3E50'][i%6];

function seedTxns(){
  const rows=[]; const today=new Date('2026-06-29');
  const samples=[

/* ---------------- charts (pure svg) ---------------- */
function AreaChart({data}){
  const W=620,H=210,P={t:14,r:12,b:24,l:36};
  const iw=W-P.l-P.r, ih=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d.v))*1.12, min=Math.min(...data.map(d=>d.v))*0.92;
  const x=i=>P.l+(i/(data.length-1))*iw;
  const y=v=>P.t+ih-((v-min)/(max-min))*ih;
  const line=data.map((d,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(d.v).toFixed(1)}`).join(' ');
  const area=`${line} L${x(data.length-1)} ${P.t+ih} L${P.l} ${P.t+ih} Z`;
  const [hov,setHov]=useState(null); const ref=useRef();
  const move=e=>{const r=ref.current.getBoundingClientRect(); const px=(e.clientX-r.left)/r.width*W;
    let i=Math.round((px-P.l)/iw*(data.length-1)); i=Math.max(0,Math.min(data.length-1,i)); setHov(i);};
  const ticks=[min,(min+max)/2,max];
  return (
    <div className="chart-wrap" style={{position:'relative'}} onMouseLeave={()=>setHov(null)}>
      <svg ref={ref} viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}} onMouseMove={move}>
        <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor="#0E7C7B" stopOpacity=".18"/><stop offset="1" stopColor="#0E7C7B" stopOpacity="0"/>
        </linearGradient></defs>
        {ticks.map((t,i)=><g key={i}><line className="gridline" x1={P.l} x2={W-P.r} y1={y(t)} y2={y(t)}/>
          <text className="axis" x={P.l-8} y={y(t)+3} textAnchor="end" fill="#8A98A4" fontSize="10.5">{fmtK(t)}</text></g>)}
        <path d={area} fill="url(#ag)"/>
        <path className="area-line" d={line}/>
        {data.map((d,i)=><text key={i} className="axis" x={x(i)} y={H-7} textAnchor="middle" fill="#8A98A4" fontSize="10.5">{d.l}</text>)}
        {hov!==null && <g>
          <line className="hov-line" x1={x(hov)} x2={x(hov)} y1={P.t} y2={P.t+ih}/>
          <circle className="dot-pt" cx={x(hov)} cy={y(data[hov].v)} r="5"/>
        </g>}
      </svg>
      {hov!==null && <div className="tip" style={{left:`${x(hov)/W*100}%`,top:`${y(data[hov].v)/H*100}%`,opacity:1}}>
        <b>{fmt(data[hov].v)}</b> · {data[hov].l}</div>}
    </div>
  );
}

function Donut({segments,total}){
  const R=58,sw=18,C=2*Math.PI*R; let off=0;
  return (
    <svg viewBox="0 0 150 150" width="150" height="150" style={{flex:'none'}}>
      <g transform="rotate(-90 75 75)">
        {segments.map((s,i)=>{const len=s.pct/100*C; const el=<circle key={i} cx="75" cy="75" r={R} fill="none"
          stroke={s.c} strokeWidth={sw} strokeDasharray={`${len} ${C-len}`} strokeDashoffset={-off}
          style={{transition:'stroke-dasharray .9s ease'}}/>; off+=len; return el;})}
      </g>
      <text x="75" y="70" textAnchor="middle" className="num" fontSize="22" fontWeight="600" fill="#0E1A24">{fmtK(total)}</text>
      <text x="75" y="88" textAnchor="middle" fontSize="11" fill="#8A98A4" fontFamily="Inter">net flow</text>
    </svg>
  );
}

/* count-up hook */
function useCountUp(target, dur=900){
  const [v,setV]=useState(0);
  useEffect(()=>{let raf,start; const from=0;
    const step=t=>{if(!start)start=t; const p=Math.min((t-start)/dur,1);
      setV(from+(target-from)*(1-Math.pow(1-p,3))); if(p<1)raf=requestAnimationFrame(step);};
    raf=requestAnimationFrame(step); return ()=>cancelAnimationFrame(raf);},[target]);
  return v;
}

function KPI({icon,iconBg,iconC,label,value,prefix,delta,up}){
  const v=useCountUp(value);
  return (
    <div className="card kpi">
      <div className="top">
        <div className="ic" style={{background:iconBg,color:iconC}}>{icon}</div>{label}
      </div>
      <div className="val num">{prefix||''}{Math.round(v).toLocaleString('en-US')}</div>
      <div className="foot">
        <span className={'pill '+(up?'pos':'neg')}>{up?I.up:I.down}{delta}</span>
        <span>vs last month</span>
      </div>
    </div>
  );
}

function statusTag(s){
  const m={completed:['pos','Completed'],pending:['warn','Pending'],failed:['neg','Failed']};
  const [cl,tx]=m[s]; const cmap={pos:['var(--positive-soft)','var(--positive)'],warn:['var(--warning-soft)','var(--warning)'],neg:['var(--negative-soft)','var(--negative)']};
  const [bg,c]=cmap[cl];
  return <span className="tag" style={{background:bg,color:c}}><span style={{width:6,height:6,borderRadius:'50%',background:c}}/>{tx}</span>;
}

              <input className="inp" type="number" placeholder="0.00" value={amount} onChange={e=>setAmount(e.target.value)}/></div>
            <div><label className="lbl">Method</label>
              <select className="inp" value={method} onChange={e=>setMethod(e.target.value)}>
                <option>Wire</option><option>Card</option><option>ACH</option><option>SEPA</option></select></div>
          </div>
          <div><label className="lbl">Category</label>
            <select className="inp" value={cat} onChange={e=>setCat(e.target.value)}>
              {Object.keys(CATS).map(c=><option key={c}>{c}</option>)}</select></div>
        </div>
        <div className="modal-f">
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn primary" style={{opacity:valid?1:.5,pointerEvents:valid?'auto':'none'}} onClick={save}>{I.plus} Add transaction</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- app shell ---------------- */
const TABS=[
  {id:'overview',label:'Overview',icon:I.grid,title:'Overview',sub:'Your money at a glance'},
  {id:'transactions',label:'Transactions',icon:I.swap,title:'Transactions',sub:'All incoming and outgoing payments',badge:3},
  {id:'analytics',label:'Analytics',icon:I.chart,title:'Analytics',sub:'Trends across the last 6 months'},
  {id:'customers',label:'Counterparties',icon:I.users,title:'Counterparties',sub:'Who you transact with most'},
  {id:'settings',label:'Settings',icon:I.gear,title:'Settings',sub:'Account and payment preferences'},
];

function App(){
  const getTab=()=>{const h=window.location.hash.replace('#/','')||'overview';
    return TABS.find(t=>t.id===h)?h:'overview';};
  const [tab,setTab]=useState(getTab());
  const [range,setRange]=useState('12M');
  const [modal,setModal]=useState(false);
  const [txns,setTxns]=useState(()=>store.get('strata.txns', seedTxns()));
  useEffect(()=>{ store.set('strata.txns', txns); },[txns]);

  useEffect(()=>{const onHash=()=>setTab(getTab()); window.addEventListener('hashchange',onHash);
    return()=>window.removeEventListener('hashchange',onHash);},[]);
  const go=id=>{window.location.hash='#/'+id; setTab(id);};
  const cur=TABS.find(t=>t.id===tab);

  return (
    <div className="shell">
      <aside className="sidebar">
        <div className="brand"><div className="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M4 17l5-5 4 3 7-8"/></svg></div>
          <div><b>Strata</b><span>Finance Console</span></div></div>
        <div className="nav-label">Workspace</div>
        {TABS.map(t=>
          <button key={t.id} className={'nav-item'+(tab===t.id?' active':'')} onClick={()=>go(t.id)}>
            {t.icon}{t.label}{t.badge && tab!==t.id && <span className="badge">{t.badge}</span>}</button>)}
        <div className="side-foot">
          <div className="side-card">
            <p>Monthly payout limit</p>
            <div className="bar"><i/></div>
            <small>$64,200 of $100,000 used</small>
          </div>
          <button className="nav-item" style={{marginTop:8,fontSize:12,justifyContent:'center',color:'var(--faint)'}}
            onClick={()=>{ if(confirm('Reset all transactions to demo data?')){ const s=seedTxns(); setTxns(s); } }}>
            Reset demo data
          </button>
        </div>
      </aside>

      <div className="main">
        <header className="topbar">
          <div><h1>{cur.title}</h1><div className="sub">{cur.sub}</div></div>
          {tab==='overview' &&
            <div className="seg" style={{marginLeft:'auto'}}>
              {['3M','6M','12M'].map(r=><button key={r} className={range===r?'on':''} onClick={()=>setRange(r)}>{r}</button>)}
            </div>}
          <div className="search" style={tab==='overview'?{marginLeft:14}:{}}>{I.search}<input placeholder="Search…"/></div>
          <button className="icon-btn">{I.bell}<span className="dot"/></button>
          <div className="avatar">SK</div>
        </header>

        <div className="scroll">
          {tab==='overview' && <Overview txns={txns} range={range}/>}
          {tab==='transactions' && <Transactions txns={txns} onAdd={()=>setModal(true)} onDelete={id=>setTxns(x=>x.filter(t=>t.id!==id))}/>}
          {tab==='analytics' && <Analytics txns={txns}/>}
          {tab==='customers' && <Customers txns={txns}/>}
          {tab==='settings' && <Settings/>}
        </div>
      </div>

      {modal && <AddModal onClose={()=>setModal(false)} onSave={t=>setTxns(x=>[t,...x])}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
